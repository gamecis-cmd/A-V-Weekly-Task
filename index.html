<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AV Dept. Weekly Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .day-btn.active { border-right: 4px solid #4f46e5; background: #eef2ff !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-indigo-900 text-white p-4 shadow-lg flex justify-between items-center px-8">
        <div class="flex items-center space-x-4">
            <img src="https://i.ibb.co/jpXW2Gn/4.png" alt="AV Logo" class="h-12 w-auto object-contain" onerror="this.onerror=null; this.src='https://placehold.co/100x100?text=AV';">
            <div>
                <h1 class="text-xl font-semibold">Audio Visual Weekly Task</h1>
                <p class="text-[10px] text-indigo-200 uppercase tracking-wider">Audio Visual Department Developed System</p>
            </div>
        </div>
        <button onclick="openAddModal()" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded-lg text-sm transition font-medium">
            <i class="fa-solid fa-plus mr-2"></i>Add New Task
        </button>
    </nav>

    <!-- Header Stats -->
    <div class="max-w-6xl mx-auto w-full px-6 pt-6">
        <div class="bg-white border border-slate-200 p-6 rounded-2xl shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <p class="text-slate-500 text-sm">Current Date</p>
                <h2 id="todayDisplay" class="text-2xl font-bold text-slate-800">-</h2>
            </div>
            <div class="text-right">
                <p class="text-slate-500 text-sm">This Week's Range (Mon-Sun)</p>
                <h2 id="weekRangeDisplay" class="text-xl font-semibold text-indigo-600">-</h2>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <main class="flex-grow max-w-6xl mx-auto w-full p-6 grid grid-cols-1 md:grid-cols-4 gap-6">
        <!-- Sidebar Menu (Days) -->
        <div id="sideMenu" class="space-y-2">
            <button onclick="switchDay('Monday', this)" class="day-btn w-full p-4 rounded-xl bg-white shadow-sm hover:shadow transition flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-blue-500"></div> Monday
            </button>
            <button onclick="switchDay('Tuesday', this)" class="day-btn w-full p-4 rounded-xl bg-white shadow-sm hover:shadow transition flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-pink-500"></div> Tuesday
            </button>
            <button onclick="switchDay('Wednesday', this)" class="day-btn w-full p-4 rounded-xl bg-white shadow-sm hover:shadow transition flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-green-500"></div> Wednesday
            </button>
            <button onclick="switchDay('Thursday', this)" class="day-btn w-full p-4 rounded-xl bg-white shadow-sm hover:shadow transition flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-orange-500"></div> Thursday
            </button>
            <button onclick="switchDay('Friday', this)" class="day-btn w-full p-4 rounded-xl bg-white shadow-sm hover:shadow transition flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-purple-500"></div> Friday
            </button>
            <button onclick="switchDay('Saturday', this)" class="day-btn w-full p-4 rounded-xl bg-white shadow-sm hover:shadow transition flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-teal-500"></div> Saturday
            </button>
            <button onclick="switchDay('Sunday', this)" class="day-btn w-full p-4 rounded-xl bg-white shadow-sm hover:shadow transition flex items-center gap-3">
                <div class="w-3 h-3 rounded-full bg-red-500"></div> Sunday
            </button>
        </div>

        <!-- Task List Area -->
        <div class="md:col-span-3 bg-white rounded-2xl p-6 shadow-sm min-h-[500px]">
            <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-4 mb-6 pb-4 border-b border-slate-100">
                <h2 id="currentDayTitle" class="text-2xl font-bold text-slate-700">Select Day...</h2>
                <button onclick="clearDayTasks()" class="text-xs text-red-500 hover:text-red-700 border border-red-200 hover:bg-red-50 px-3 py-1.5 rounded-lg transition font-medium flex items-center gap-1.5 self-start sm:self-auto">
                    <i class="fa-solid fa-trash-can"></i> Delete All Tasks for Today
                </button>
            </div>
            <div id="tasksContainer" class="grid grid-cols-1 gap-4">
                <div class="text-center py-10 text-slate-400">Loading schedule...</div>
            </div>
        </div>
    </main>

    <!-- Task Modal (Add/Edit) -->
    <div id="taskModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 id="modalTitle" class="text-xl font-bold mb-4 text-slate-800">Add New Task</h3>
            <form id="taskForm" onsubmit="saveTask(event)" class="space-y-4">
                <input type="hidden" id="taskId">
                
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Task Name</label>
                    <input type="text" id="taskName" required placeholder="Enter task name" class="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Task Date</label>
                    <input type="date" id="taskDate" required onchange="updateDayFromDate(this.value)" class="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Work Day</label>
                    <select id="taskDay" required class="w-full p-2.5 border border-slate-200 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                        <option value="Saturday">Saturday</option>
                        <option value="Sunday">Sunday</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Start Time</label>
                        <input type="time" id="taskStartTime" required class="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">End Time</label>
                        <input type="time" id="taskEndTime" required class="w-full p-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Venue / Location</label>
                    <select id="taskLocation" required class="w-full p-2.5 border border-slate-200 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        <option value="">Select Location</option>
                        <option value="Amphitheatre">Amphitheatre</option>
                        <option value="Grand Theatre">Grand Theatre</option>
                        <option value="PYP Function room">PYP Function room</option>
                        <option value="MYP Function Room">MYP Function Room</option>
                        <option value="P501">P501</option>
                        <option value="P303">P303</option>
                        <option value="P308">P308</option>
                        <option value="P301">P301</option>
                        <option value="MYP Gym">MYP Gym</option>
                        <option value="SC Gym">SC Gym</option>
                        <option value="PY Gym">PY Gym</option>
                        <option value="Soccer Field">Soccer Field</option>
                        <option value="School Lobby">School Lobby</option>
                        <option value="Extra Venue">Extra Venue</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Equipment Required</label>
                    <div id="equipmentCheckboxes" class="grid grid-cols-2 gap-2 p-3 border border-slate-200 rounded-lg bg-slate-50">
                        <label class="flex items-center space-x-2 text-sm text-slate-700 cursor-pointer"><input type="checkbox" name="equipment" value="Microphones" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> <span>Microphones</span></label>
                        <label class="flex items-center space-x-2 text-sm text-slate-700 cursor-pointer"><input type="checkbox" name="equipment" value="Projector" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> <span>Projector</span></label>
                        <label class="flex items-center space-x-2 text-sm text-slate-700 cursor-pointer"><input type="checkbox" name="equipment" value="Laptop" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> <span>Laptop</span></label>
                        <label class="flex items-center space-x-2 text-sm text-slate-700 cursor-pointer"><input type="checkbox" name="equipment" value="Clicker" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> <span>Clicker</span></label>
                        <label class="flex items-center space-x-2 text-sm text-slate-700 cursor-pointer"><input type="checkbox" name="equipment" value="TV" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> <span>TV</span></label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Stand-by Status</label>
                    <select id="taskStandby" required class="w-full p-2.5 border border-slate-200 rounded-lg bg-white focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        <option value="Stand-by">Stand-by</option>
                        <option value="Don't Stand-by" selected>Don't Stand-by</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">Assignee(s) (Select Multiple)</label>
                    <div id="assigneeCheckboxes" class="grid grid-cols-2 gap-2 p-3 border border-slate-200 rounded-lg bg-slate-50">
                        <label class="flex items-center space-x-2 text-sm text-slate-700 cursor-pointer"><input type="checkbox" name="assignee" value="Game" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> <span>Game</span></label>
                        <label class="flex items-center space-x-2 text-sm text-slate-700 cursor-pointer"><input type="checkbox" name="assignee" value="Wat" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> <span>Wat</span></label>
                        <label class="flex items-center space-x-2 text-sm text-slate-700 cursor-pointer"><input type="checkbox" name="assignee" value="Max" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> <span>Max</span></label>
                        <label class="flex items-center space-x-2 text-sm text-slate-700 cursor-pointer"><input type="checkbox" name="assignee" value="Ohm" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> <span>Ohm</span></label>
                        <label class="flex items-center space-x-2 text-sm text-slate-700 cursor-pointer"><input type="checkbox" name="assignee" value="Korn" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4"> <span>Korn</span></label>
                    </div>
                </div>

                <div class="flex gap-2 justify-end pt-4">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-slate-500 font-medium hover:bg-slate-100 rounded-lg transition">Cancel</button>
                    <button type="submit" id="saveBtn" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium transition">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyJikQio8vML4OvkchM16cqNz0TtHszQxXfwUixGcFfEHq76iELOpawgnDMr0kj1OXk/exec";
        let state = { tasks: [], currentDay: 'Monday' };

        function updateDayFromDate(dateStr) {
            const date = new Date(dateStr);
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const dayName = days[date.getUTCDay()];
            document.getElementById('taskDay').value = dayName;
        }

        function getTaskDateString(task) {
            if (task.date) {
                const d = new Date(task.date);
                if (!isNaN(d.getTime())) {
                    return d.toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' });
                }
            }
            const now = new Date();
            const dayMap = { 'Monday': 1, 'Tuesday': 2, 'Wednesday': 3, 'Thursday': 4, 'Friday': 5, 'Saturday': 6, 'Sunday': 0 };
            const targetDayCode = dayMap[task.day];
            const currentDayCode = now.getDay();
            const diff = targetDayCode - currentDayCode;
            const targetDate = new Date();
            targetDate.setDate(now.getDate() + diff);
            return targetDate.toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function updateDateTimeInfo() {
            const now = new Date();
            document.getElementById('todayDisplay').innerText = now.toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' });
            
            const day = now.getDay(); 
            const diffToMonday = now.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(now);
            monday.setDate(diffToMonday);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            
            document.getElementById('weekRangeDisplay').innerText = 
                `${monday.getDate()} ${monday.toLocaleDateString('en-US', {month:'short'})} - ${sunday.getDate()} ${sunday.toLocaleDateString('en-US', {month:'short'})} ${sunday.getFullYear()}`;
        }

        function formatTime(val) {
            if (!val) return "--:--";
            if (typeof val === 'string' && (val.includes("T") || val.includes(":") || val.includes("-"))) {
                const date = new Date(val);
                if (!isNaN(date.getTime())) {
                    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
                }
            }
            return val.toString().substring(0, 5); 
        }

        function formatTimeForInput(val) {
            if (!val) return "";
            if (typeof val === 'string' && val.includes("T")) {
                const date = new Date(val);
                if (!isNaN(date.getTime())) {
                    return date.toTimeString().substring(0, 5);
                }
            }
            return val.toString().substring(0, 5);
        }

        async function loadData() {
            try {
                const res = await fetch(`${WEB_APP_URL}?action=getTasks`);
                const rawTasks = await res.json();
                
                state.tasks = rawTasks.map(t => {
                    const dayParts = t.day ? t.day.split('|') : [];
                    const locParts = t.location ? t.location.split('|') : [];
                    return {
                        ...t,
                        day: dayParts[0] || 'Monday',
                        date: dayParts[1] || '',
                        location: locParts[0] || '',
                        equipment: locParts[1] ? locParts[1].split(',') : [],
                        standby: locParts[2] || "Don't Stand-by"
                    };
                });
                render();
            } catch (err) { console.error("Error loading:", err); }
        }

        function switchDay(day, el) {
            state.currentDay = day;
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            if(el) el.classList.add('active');
            document.getElementById('currentDayTitle').innerText = day + " Schedule";
            render();
        }

        function render() {
            const container = document.getElementById('tasksContainer');
            container.innerHTML = "";
            const filtered = state.tasks.filter(t => t.day === state.currentDay);
            
            if(filtered.length === 0) {
                container.innerHTML = `<p class="text-slate-400 italic text-center py-8">No tasks scheduled for today.</p>`;
                return;
            }
            
            filtered.forEach(task => {
                const displayAssignee = (Array.isArray(task.assignee) 
                    ? task.assignee.join(", ") 
                    : (task.assignee || "")).trim() || '<span class="text-slate-400 italic font-normal">None Assigned</span>';

                const displayEquipment = task.equipment && task.equipment.length > 0
                    ? task.equipment.join(", ")
                    : "None";

                const isStandby = task.standby === "Stand-by";
                const standbyBadge = isStandby 
                    ? `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold bg-emerald-100 text-emerald-800"><i class="fa-solid fa-headset mr-1"></i> Stand-by</span>`
                    : `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold bg-slate-100 text-slate-600"><i class="fa-solid fa-clock-rotate-left mr-1"></i> No Stand-by</span>`;

                const card = document.createElement('div');
                card.className = "border border-slate-150 rounded-xl p-4 flex justify-between items-center bg-white shadow-sm hover:border-indigo-300 transition";
                card.innerHTML = `
                    <div class="space-y-1.5 flex-grow pr-4">
                        <div class="flex items-center gap-2 flex-wrap">
                            <h4 class="font-bold text-lg text-slate-800">${task.name}</h4>
                            ${standbyBadge}
                        </div>
                        <p class="text-sm text-indigo-600 font-medium"><i class="fa-regular fa-calendar-days mr-1"></i> ${getTaskDateString(task)}</p>
                        <p class="text-sm text-slate-500"><i class="fa-regular fa-clock mr-1"></i> ${formatTime(task.startTime)} - ${formatTime(task.endTime)} | <i class="fa-solid fa-location-dot mx-1"></i> ${task.location}</p>
                        <p class="text-xs font-bold text-slate-600"><i class="fa-solid fa-toolbox mr-1"></i> Equipment: <span class="font-semibold text-slate-500">${displayEquipment}</span></p>
                        <p class="text-xs font-bold text-slate-600"><i class="fa-solid fa-user mr-1"></i> Assignee(s): ${displayAssignee}</p>
                    </div>
                    <div class="flex gap-1 flex-shrink-0">
                        <button onclick="openEditModal('${task.id}')" class="text-amber-500 hover:text-amber-600 hover:bg-amber-50 p-2.5 rounded-lg transition" title="Edit Task">
                            <i class="fa-solid fa-pen-to-square"></i>
                        </button>
                        <button onclick="deleteTask('${task.id}')" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2.5 rounded-lg transition" title="Delete Task">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Add New Task";
            document.getElementById('taskId').value = "";
            document.getElementById('taskForm').reset();
            document.getElementById('taskDay').value = state.currentDay;
            
            document.querySelectorAll('input[name="equipment"]').forEach(cb => cb.checked = false);
            document.getElementById('taskStandby').value = "Don't Stand-by";

            const now = new Date();
            const dayMap = { 'Monday': 1, 'Tuesday': 2, 'Wednesday': 3, 'Thursday': 4, 'Friday': 5, 'Saturday': 6, 'Sunday': 0 };
            const targetDayCode = dayMap[state.currentDay];
            const currentDayCode = now.getDay();
            const diff = targetDayCode - currentDayCode;
            const targetDate = new Date();
            targetDate.setDate(now.getDate() + diff);
            document.getElementById('taskDate').value = targetDate.toISOString().split('T')[0];

            document.getElementById('taskModal').classList.remove('hidden');
        }

        function openEditModal(id) {
            const task = state.tasks.find(t => t.id === id);
            if (!task) return;

            document.getElementById('modalTitle').innerText = "Edit Task Details";
            document.getElementById('taskId').value = task.id;
            document.getElementById('taskName').value = task.name;
            document.getElementById('taskDay').value = task.day;
            document.getElementById('taskStartTime').value = formatTimeForInput(task.startTime);
            document.getElementById('taskEndTime').value = formatTimeForInput(task.endTime);
            document.getElementById('taskLocation').value = task.location;
            document.getElementById('taskStandby').value = task.standby || "Don't Stand-by";

            if (task.date) {
                document.getElementById('taskDate').value = task.date.split('T')[0];
            } else {
                const now = new Date();
                const dayMap = { 'Monday': 1, 'Tuesday': 2, 'Wednesday': 3, 'Thursday': 4, 'Friday': 5, 'Saturday': 6, 'Sunday': 0 };
                const targetDayCode = dayMap[task.day];
                const currentDayCode = now.getDay();
                const diff = targetDayCode - currentDayCode;
                const targetDate = new Date();
                targetDate.setDate(now.getDate() + diff);
                document.getElementById('taskDate').value = targetDate.toISOString().split('T')[0];
            }

            const assigneeCheckboxes = document.querySelectorAll('input[name="assignee"]');
            assigneeCheckboxes.forEach(cb => cb.checked = false);
            if (task.assignee) {
                const currentAssignees = Array.isArray(task.assignee)
                    ? task.assignee
                    : task.assignee.split(',').map(name => name.trim());
                assigneeCheckboxes.forEach(cb => {
                    if (currentAssignees.includes(cb.value)) {
                        cb.checked = true;
                    }
                });
            }

            const equipmentCheckboxes = document.querySelectorAll('input[name="equipment"]');
            equipmentCheckboxes.forEach(cb => cb.checked = false);
            if (task.equipment) {
                equipmentCheckboxes.forEach(cb => {
                    if (task.equipment.includes(cb.value)) {
                        cb.checked = true;
                    }
                });
            }

            document.getElementById('taskModal').classList.remove('hidden');
        }

        function closeModal() { 
            document.getElementById('taskModal').classList.add('hidden'); 
            document.getElementById('taskForm').reset(); 
        }

        async function saveTask(e) {
            e.preventDefault();
            const idInput = document.getElementById('taskId').value;
            const isEdit = idInput !== "";

            const checkedAssignees = document.querySelectorAll('input[name="assignee"]:checked');
            const selectedAssignees = Array.from(checkedAssignees).map(cb => cb.value);

            const checkedEquipment = document.querySelectorAll('input[name="equipment"]:checked');
            const selectedEquipment = Array.from(checkedEquipment).map(cb => cb.value);

            const locationBase = document.getElementById('taskLocation').value;
            const standbyVal = document.getElementById('taskStandby').value;

            const task = {
                id: isEdit ? idInput : 'task-' + Date.now(),
                name: document.getElementById('taskName').value,
                day: document.getElementById('taskDay').value + '|' + document.getElementById('taskDate').value,
                startTime: document.getElementById('taskStartTime').value,
                endTime: document.getElementById('taskEndTime').value,
                location: locationBase + '|' + selectedEquipment.join(',') + '|' + standbyVal,
                assignee: selectedAssignees.join(', '), 
                status: 'Pending'
            };

            const action = isEdit ? 'edit' : 'add';

            await fetch(WEB_APP_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action, task }) 
            });

            closeModal();
            loadData();
        }

        async function deleteTask(id) {
            if(!confirm("Are you sure you want to delete this task?")) return;
            await fetch(WEB_APP_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'delete', task: { id } }) 
            });
            loadData();
        }

        async function clearDayTasks() {
            const filtered = state.tasks.filter(t => t.day === state.currentDay);
            if (filtered.length === 0) {
                alert("There are no tasks to delete for today.");
                return;
            }

            if (!confirm(`Are you sure you want to delete all ${filtered.length} tasks for ${state.currentDay}? This cannot be undone.`)) {
                return;
            }

            try {
                const deletePromises = filtered.map(task => 
                    fetch(WEB_APP_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ action: 'delete', task: { id: task.id } }) 
                    })
                );
                await Promise.all(deletePromises);
                loadData();
            } catch (err) {
                console.error("Error clearing tasks:", err);
                alert("Error occurred while deleting tasks.");
            }
        }

        window.onload = () => {
            updateDateTimeInfo();
            switchDay('Monday', document.querySelector('.day-btn'));
            loadData();
        };
    </script>
</body>
</html>
